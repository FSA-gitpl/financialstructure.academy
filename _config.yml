headers:
  strict-transport-security: "max-age=31536000; includeSubDomains"
  content-security-policy: "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.google-analytics.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none';"
  x-content-type-options: "nosniff"
  x-frame-options: "DENY"
  referrer-policy: "strict-origin-when-cross-origin"
